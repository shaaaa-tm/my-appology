<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Apology Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Background music -->
  <audio id="bg-music" autoplay loop>
    <source src="soft-music.mp3" type="audio/mpeg">
  </audio>

  <div class="container">
    <h1 class="title">I'm Sorry 💛</h1>

    <!-- Hearts animation -->
    <div class="hearts">
      <div class="heart"></div>
      <div class="heart"></div>
      <div class="heart"></div>
    </div>

    <p class="message">
      I hope we can find a little space and time to talk again. 💛
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
